name: self-test-deny

on:
  workflow_dispatch:

jobs:
  direct-deny-proof:
    runs-on: ubuntu-latest
    steps:
      - name: Probe pubkey endpoint
        shell: bash
        run: |
          set -euo pipefail
          STATUS=$(curl -sS -o pubkey.txt -w "%{http_code}" "http://107.172.34.21:8787/pubkey")
          test "$STATUS" = "200"
          test -s pubkey.txt

      - name: Build canonical deny payload
        shell: bash
        run: |
          set -euo pipefail
          printf 'sk-test-123\n' > added_lines.txt
          SHA=$(sha256sum added_lines.txt | awk '{print $1}')
          printf '{"schema":"intent-v1","repo":"pinfloyd/cnp-action","ref":"refs/heads/main","policy_id":"ai-secrets-v1","added_lines":"sk-test-123","added_lines_sha256":"%s"}' "$SHA" > intent.json
          test -s intent.json

      - name: Post canonical deny payload to admit
        shell: bash
        run: |
          set -euo pipefail
          STATUS=$(curl -sS -o admit_response.json -w "%{http_code}" -X POST "http://107.172.34.21:8787/admit" -H "Content-Type: application/json" --data-binary @intent.json)
          echo "HTTP_STATUS=$STATUS"
          test "$STATUS" = "200"
          test -s admit_response.json

      - name: Assert DENY decision
        shell: bash
        run: |
          set -euo pipefail
          python -c "import json; obj=json.load(open('admit_response.json','r',encoding='utf-8')); d=obj.get('decision') or obj.get('verdict') or ((obj.get('record') or {}).get('decision') if isinstance(obj.get('record'),dict) else None); print(d); raise SystemExit(0 if d=='DENY' else 1)"
