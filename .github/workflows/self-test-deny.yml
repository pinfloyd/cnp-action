name: self-test-deny

on:
  workflow_dispatch:

jobs:
  direct-deny-proof:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch pubkey
        shell: bash
        run: |
          set -euo pipefail
          STATUS=$(curl -sS -o pubkey.txt -w "%{http_code}" "http://107.172.34.21:8787/pubkey")
          test "$STATUS" = "200"
          test -s pubkey.txt

      - name: Build deny payload
        shell: bash
        run: |
          set -euo pipefail
          cat > intent.json <<'JSON'
          {
            "added_lines": "sk-test-123",
            "added_lines_sha256": "test-sha256",
            "policy_id": "ai-secrets-v1",
            "ref": "refs/heads/main",
            "repo": "pinfloyd/cnp-action",
            "schema": "intent-v1"
          }
          JSON

      - name: Post deny-case to admit
        shell: bash
        run: |
          set -euo pipefail
          STATUS=$(curl -sS -o admit_response.json -w "%{http_code}" -X POST "http://107.172.34.21:8787/admit" -H "Content-Type: application/json" --data-binary @intent.json)
          echo "HTTP_STATUS=$STATUS"
          test "$STATUS" = "200"
          test -s admit_response.json

      - name: Assert deny-like response
        shell: bash
        run: |
          set -euo pipefail
          grep -E '"decision"[[:space:]]*:[[:space:]]*"DENY"|"decision"[[:space:]]*:[[:space:]]*"BLOCK"|'"'"'DENY'"'"'|"verdict"[[:space:]]*:[[:space:]]*"DENY"' admit_response.json
