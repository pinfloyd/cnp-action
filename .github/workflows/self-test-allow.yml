name: self-test-allow

on:
  workflow_dispatch:

jobs:
  direct-allow-proof:
    runs-on: ubuntu-latest
    steps:
      - name: Probe pubkey endpoint
        shell: bash
        run: |
          set -euo pipefail
          STATUS=$(curl -sS -o pubkey.txt -w "%{http_code}" "https://admit.ai-admissibility.com/pubkey")
          test "$STATUS" = "200"
          test -s pubkey.txt

      - name: Materialize exact proven allow request
        shell: bash
        run: |
          set -euo pipefail
          printf '%s' '' | base64 -d > intent.json
          test -s intent.json

      - name: Post exact proven allow request to admit
        shell: bash
        run: |
          set -euo pipefail
          STATUS=$(curl -sS -o admit_response.json -w "%{http_code}" -X POST "https://admit.ai-admissibility.com/admit" -H "Content-Type: application/json" --data-binary @intent.json -H "X-Access-Tier: EVALUATION")
          echo "HTTP_STATUS=$STATUS"
          test "$STATUS" = "200"
          test -s admit_response.json

      - name: Assert ALLOW decision
        shell: bash
        run: |
          set -euo pipefail
          python -c "import json; obj=json.load(open('admit_response.json','r',encoding='utf-8')); d=obj.get('decision') or obj.get('verdict') or ((obj.get('record') or {}).get('decision') if isinstance(obj.get('record'),dict) else None); print(d); raise SystemExit(0 if d=='ALLOW' else 1)"

