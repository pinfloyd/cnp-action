name: self-test-allow

on:
  workflow_dispatch:

jobs:
  direct-allow-proof:
    runs-on: ubuntu-latest
    steps:
      - name: Probe pubkey endpoint
        shell: bash
        run: |
          set -euo pipefail
          STATUS=$(curl -sS -o pubkey.txt -w "%{http_code}" "http://107.172.34.21:8787/pubkey")
          test "$STATUS" = "200"
          test -s pubkey.txt

      - name: Build canonical allow payload
        shell: bash
        run: |
          set -euo pipefail
          python -c "import hashlib,json; lines=['hello']; joined='\n'.join(lines)+'\n'; obj={'schema':'intent-v1','repo':'pinfloyd/cnp-action','ref':'refs/heads/main','policy_id':'ai-secrets-v1','added_lines':lines,'added_lines_sha256':hashlib.sha256(joined.encode('utf-8')).hexdigest()}; open('intent.json','w',encoding='utf-8').write(json.dumps(obj,separators=(',',':')))"
          test -s intent.json

      - name: Post canonical allow payload to admit
        shell: bash
        run: |
          set -euo pipefail
          STATUS=$(curl -sS -o admit_response.json -w "%{http_code}" -X POST "http://107.172.34.21:8787/admit" -H "Content-Type: application/json" --data-binary @intent.json)
          echo "HTTP_STATUS=$STATUS"
          test "$STATUS" = "200"
          test -s admit_response.json

      - name: Assert ALLOW decision
        shell: bash
        run: |
          set -euo pipefail
          python -c "import json; obj=json.load(open('admit_response.json','r',encoding='utf-8')); d=obj.get('decision') or obj.get('verdict') or ((obj.get('record') or {}).get('decision') if isinstance(obj.get('record'),dict) else None); print(d); raise SystemExit(0 if d=='ALLOW' else 1)"
